<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Live Status</title><style>body{font-family:system-ui;padding:24px;max-width:700px;margin:auto} .c{padding:12px;border:1px solid #ddd;border-radius:10px;margin:10px 0}</style></head><body><h2>Live OpenClaw Status</h2><div class="c" id="m">Model: ...</div><div class="c" id="s">Session quota: ...</div><div class="c" id="d">Daily quota: ...</div><script>async function tick(){const r=await fetch('/api/status');const j=await r.json();document.getElementById('m').textContent='Model: '+(j.model??'unknown');document.getElementById('s').textContent='Session quota: '+(j.sessionLeft==null?'n/a':j.sessionLeft+'% left');document.getElementById('d').textContent='Daily quota: '+(j.dayLeft==null?'n/a':j.dayLeft+'% left');}tick();setInterval(tick,15000);</script></body></html>

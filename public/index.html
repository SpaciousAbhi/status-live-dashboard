<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jarvis Live Status</title>
  <style>
    :root { --bg:#0b1020; --card:#121933; --line:#2a3567; --txt:#e7edff; --muted:#9fb0e8; --ok:#49d68a; }
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(1200px 600px at 10% -10%,#23357d 0,#0b1020 55%);font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif;color:var(--txt)}
    .wrap{max-width:900px;margin:0 auto;padding:22px}
    .title{font-size:28px;font-weight:800;letter-spacing:.3px}
    .sub{color:var(--muted);margin-top:6px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-top:16px}
    .card{background:linear-gradient(180deg,#141d3b,#101834);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 8px 30px rgba(0,0,0,.25)}
    .k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.7px}
    .v{margin-top:8px;font-size:22px;font-weight:700;word-break:break-word}
    .badge{display:inline-block;padding:4px 9px;border-radius:999px;background:#1f2b57;border:1px solid #31407a;color:#bcd0ff;font-size:12px}
    .ok{color:var(--ok)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.35}
    .models{max-height:240px;overflow:auto;margin:0;padding-left:18px}
    .foot{margin-top:12px;color:var(--muted);font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">Jarvis Live Status</div>
    <div class="sub">Auto-refresh every 20s</div>

    <div class="grid">
      <div class="card"><div class="k">Current Model</div><div class="v" id="model">...</div></div>
      <div class="card"><div class="k">Context Used</div><div class="v" id="used">...</div></div>
      <div class="card"><div class="k">Remaining Tokens</div><div class="v" id="left">...</div></div>
      <div class="card"><div class="k">Approx Session Load</div><div class="v" id="pct">...</div></div>
    </div>

    <div class="grid">
      <div class="card"><div class="k">Channels</div><div class="v mono" id="channels">...</div></div>
      <div class="card"><div class="k">Available Models</div><ul class="models mono" id="models"></ul></div>
    </div>

    <div class="foot" id="ts">Last update: ...</div>
  </div>

  <script>
    const nf = new Intl.NumberFormat();
    function set(id, v){ document.getElementById(id).textContent = v; }
    async function tick(){
      try{
        const r = await fetch('/api/status', {cache:'no-store'});
        const j = await r.json();
        if(!j.ok) throw new Error(j.error || 'status error');

        set('model', j.model || 'unknown');
        set('used', `${nf.format(j.inputTokens||0)} / ${nf.format(j.contextTokens||0)}`);
        set('left', nf.format(j.remaining||0));
        set('pct', `${j.percentUsed ?? 'n/a'}%`);
        set('channels', (j.channelSummary||[]).join(' | ') || 'n/a');

        const ul = document.getElementById('models');
        ul.innerHTML = '';
        (j.availableModels||[]).forEach(m => {
          const li = document.createElement('li');
          li.textContent = m;
          ul.appendChild(li);
        });

        set('ts', `Last update: ${new Date(j.now).toLocaleString()}`);
      }catch(e){
        set('ts', `Error: ${e.message}`);
      }
    }
    tick();
    setInterval(tick, 20000);
  </script>
</body>
</html>
